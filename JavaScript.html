<script>
// ============================================================
//  1. GLOBAL STATE & CONFIGURATION
// ============================================================
const App = {
  user:         null,
  requests:     [],
  allUsers:     [], // เพื่อเก็บข้อมูลผู้ใช้ทั้งหมดสำหรับแอดมิน
  currentReq:   null,
  deleteTarget: null,
  filterStatus: "",
  filterDept:   "",
  searchQuery:  "",
};

let dashboardTimer = null; // ตัวตั้งเวลาสำหรับระบบ Real-time Dashboard

// ============================================================
//  2. GOOGLE SCRIPT BRIDGE (BACKEND LINK)
// ============================================================
const GS = {
  call(fn, ...args) {
    return new Promise((resolve) => {
      if (typeof google !== "undefined" && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(err => resolve({ success: false, message: err.message }))
          [fn](...args);
      } else {
        // Fallback สำหรับใช้งานตรวจสอบรีวิวบนคอมพิวเตอร์ (Mock Data)
        resolve(MockData[fn](...args));
      }
    });
  }
};

// ============================================================
//  3. MOCK DATA ENGINE (สำหรับจำลองระบบ)
// ============================================================
const MOCK_REQUESTS = [
  { id:"1", requestNo:"REQ250523-0001", requesterName:"กิตติศักดิ์ ศรีราศรี", requesterEmail:"doctor01@hospital.go.th", department:"อายุรกรรม", reportType:"รายงานผู้ป่วยนอก (OPD)", dateFrom:"2026-05-23T00:00:00.000Z", dateTo:"2026-05-24T00:00:00.000Z", purpose:"ดึงรายงาน", urgency:"ปกติ", status:"รอดำเนินการ", adminNote:"", createdAt:"2026-06-01T09:00:00Z", updatedAt:"2026-06-01T09:00:00Z", createdBy:"doctor01" }
];

const MOCK_USERS = [
  { username:"admin", password:"admin1234", displayName:"ผู้ดูแลระบบ", email:"admin@hospital.go.th", role:"admin", department:"สารสนเทศ", lineId:"", telegramId:"" },
  { username:"doctor01", password:"doc1234", displayName:"กิตติศักดิ์ ศรีราศรี", email:"doctor01@hospital.go.th", role:"doctor", department:"อายุรกรรม", lineId:"", telegramId:"" }
];

const MockData = {
  login(username, password) {
    const u = MOCK_USERS.find(x => String(x.username).trim() === String(username).trim() && String(x.password).trim() === String(password).trim());
    if (u) return { success: true, user: u };
    return { success: false, message: "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง" };
  },
  getRequests() { return { success: true, data: MOCK_REQUESTS }; },
  getDashboardStats() {
    return { success: true, data: {
      total: MOCK_REQUESTS.length,
      pending: MOCK_REQUESTS.filter(r=>r.status==="รอดำเนินการ").length,
      processing: MOCK_REQUESTS.filter(r=>r.status==="กำลังดำเนินการ").length,
      completed: MOCK_REQUESTS.filter(r=>r.status==="เสร็จสิ้น").length,
      rejected: MOCK_REQUESTS.filter(r=>r.status==="ปฏิเสธ").length,
      recent: MOCK_REQUESTS.slice(-5).reverse()
    }};
  },
  createRequest(payload, username) {
    const id = "mock-" + Date.now();
    const requestNo = "REQ" + Date.now().toString().slice(-6);
    MOCK_REQUESTS.push({ id, requestNo, ...payload, status:"รอดำเนินการ", adminNote:"", createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(), createdBy:username });
    return { success: true, id, requestNo };
  },
  updateRequest(id, payload) {
    const idx = MOCK_REQUESTS.findIndex(r=>r.id==id);
    if (idx >= 0) Object.assign(MOCK_REQUESTS[idx], payload, { updatedAt: new Date().toISOString() });
    return { success: true };
  },
  deleteRequest(id) {
    const idx = MOCK_REQUESTS.findIndex(r=>r.id==id);
    if (idx >= 0) MOCK_REQUESTS.splice(idx, 1);
    return { success: true };
  },
  getUsers() { return { success: true, data: MOCK_USERS }; },
  saveUser(payload) {
    const idx = MOCK_USERS.findIndex(x => String(x.username).trim() === String(payload.username).trim());
    if (idx >= 0) Object.assign(MOCK_USERS[idx], payload);
    else MOCK_USERS.push(payload);
    return { success: true };
  },
  deleteUser(username) {
    const idx = MOCK_USERS.findIndex(x => String(x.username).trim() === String(username).trim());
    if (idx >= 0) MOCK_USERS.splice(idx, 1);
    return { success: true };
  },
  testLineNotification(targetId) { return { success: true, message: "ส่งข้อความทดสอบเข้า LINE เรียบร้อยแล้ว (ID: " + (targetId || "แอดมินกลุ่ม") + ")" }; },
  sendReportEmail() { return { success: true }; },
  getMonthlyReport() { return { success: true, data: MOCK_REQUESTS }; },
  updateProfile(username, payload) {
    const u = MOCK_USERS.find(x => String(x.username).trim() === String(username).trim());
    if (u) {
      u.lineId = payload.lineId;
      u.telegramId = payload.telegramId;
      return { success: true };
    }
    return { success: false, message: "ไม่พบผู้ใช้ที่ต้องการแก้ไข" };
  },
  testTelegramNotification(chatId) { return { success: true, message: "ส่งข้อความทดสอบเข้า Telegram แล้ว" }; }
};

// ════════════════════════════════════════════════════════
//  4. UTILITIES & FORMATTERS
// ════════════════════════════════════════════════════════
function toast(msg, type="info") {
  const c = document.getElementById("toast-container");
  if (!c) return;
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  const icons = { success:"✅", error:"❌", info:"ℹ️" };
  el.innerHTML = `<span>${icons[type]||"ℹ️"}</span><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(() => { 
    el.style.opacity="0"; el.style.transform="translateX(20px)"; el.style.transition="all .3s"; 
    setTimeout(()=>el.remove(), 300); 
  }, 3000);
}

function openModal(id) { const el = document.getElementById(id); if (el) el.classList.add("open"); }
function closeModal(id) { const el = document.getElementById(id); if (el) el.classList.remove("open"); }

function statusBadge(s) {
  const map = { "รอดำเนินการ":"badge-pending","กำลังดำเนินการ":"badge-process","เสร็จสิ้น":"badge-done","ปฏิเสธ":"badge-rejected" };
  return `<span class="badge ${map[s]||'badge-normal'}">${s}</span>`;
}
function urgencyBadge(u) {
  const map = { "ด่วนที่สุด":"badge-urgent","สูง":"badge-high","ปกติ":"badge-normal" };
  return `<span class="badge ${map[u]||'badge-normal'}">${u}</span>`;
}
function formatDate(iso) {
  if (!iso) return "-";
  try { return new Date(iso).toLocaleDateString("th-TH", { year:"numeric", month:"short", day:"numeric" }); } catch { return iso; }
}

function formatThaiDate(d) {
  if (!d) return "-";
  try {
    const dateObj = new Date(d);
    if (isNaN(dateObj.getTime())) {
      const parts = d.split("T")[0].split("-");
      if (parts.length === 3) {
        const [y, m, dd] = parts;
        const months = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
        return `${parseInt(dd)} ${months[parseInt(m)-1]} ${parseInt(y)+543}`;
      }
      return d;
    }
    const dd = dateObj.getDate();
    const m = dateObj.getMonth();
    const y = dateObj.getFullYear();
    const months = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
    return `${dd} ${months[m]} ${y + 543}`;
  } catch (e) { return d; }
}

function statusColor(s) {
  return { "รอดำเนินการ":"#f9ab00","กำลังดำเนินการ":"#4285f4","เสร็จสิ้น":"#1e8e3e","ปฏิเสธ":"#d93025" }[s]||"#9aa0a6";
}

// ============================================================
//  5. AUTHENTICATION (SYSTEM LOGIN / LOGOUT)
// ============================================================
async function doLogin() {
  const errEl = document.getElementById("login-error");
  if (errEl) errEl.style.display = "none";

  const uEl = document.getElementById("login-username");
  const pEl = document.getElementById("login-password");
  if (!uEl || !pEl) return;

  const u = uEl.value.trim();
  const p = pEl.value.trim();

  if (!u || !p) {
    showLoginError("กรุณากรอกชื่อผู้ใช้และรหัสผ่าน");
    return;
  }

  const btnText = document.getElementById("login-btn-text");
  const btn = document.getElementById("login-btn");
  if (btnText && btn) {
    btn.disabled = true;
    btnText.textContent = "กำลังเข้าสู่ระบบ...";
  }

  try {
    const res = await GS.call("login", u, p);
    if (res.success) {
      App.user = res.user;
      const rem = document.getElementById("login-remember");
      if (rem && rem.checked) {
        localStorage.setItem("hosxp_username", u);
        localStorage.setItem("hosxp_password", p);
      } else {
        localStorage.removeItem("hosxp_username");
        localStorage.removeItem("hosxp_password");
      }
      
      startApp();
    } else {
      showLoginError(res.message);
    }
  } catch (e) {
    showLoginError("เกิดข้อผิดพลาดในการเชื่อมต่อ: " + e.message);
  } finally {
    if (btnText && btn) {
      btn.disabled = false;
      btnText.textContent = "เข้าสู่ระบบ";
    }
  }
}

function showLoginError(msg) {
  const el = document.getElementById("login-error");
  if (el) { el.textContent = "⚠️ " + msg; el.style.display = "block"; }
}

function logout() {
  App.user = null; App.requests = [];
  clearInterval(dashboardTimer);

  const chatPanel = document.getElementById("ai-chat-panel");
  if (chatPanel) chatPanel.style.display = "none";
  
  // ซ่อนวิดเจ็ต AI หลัก
  const chatWidget = document.getElementById("ai-chat-widget");
  if (chatWidget) chatWidget.style.display = "none";
  
  aiChatHistory = [
    { role: "model", text: "มีข้อสงสัยเกี่ยวกับตารางข้อมูล HOSxP หรือตัวอย่างคำสั่ง SQL ดึงข้อมูลหรือไม่? สอบถามผมได้เลยครับ!" }
  ];
  const chatMsgs = document.getElementById("ai-chat-messages");
  if (chatMsgs) {
    chatMsgs.innerHTML = `<div class="chat-message model">มีข้อสงสัยเกี่ยวกับตารางข้อมูล HOSxP หรือตัวอย่างคำสั่ง SQL ดึงข้อมูลหรือไม่? สอบถามผมได้เลยครับ!</div>`;
  }
  
  document.getElementById("app-shell").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

// ============================================================
//  6. APP INITIALIZATION & NAVIGATION
// ============================================================
function startApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-shell").style.display = "block";

  const u = App.user;
  const isAdmin = u.role === "admin";

  document.getElementById("sidebar-username").textContent = u.displayName;
  document.getElementById("sidebar-role").innerHTML = (isAdmin ? "ผู้ดูแลระบบ (IT)" : `เจ้าหน้าที่ ${u.department}`) + ' <span style="font-size: 10px; opacity: 0.7;">IT</span>';
  document.getElementById("user-avatar").textContent = isAdmin ? "🛡️" : "👤";

  document.querySelectorAll(".admin-only").forEach(el => el.style.display = isAdmin ? "block" : "none");
  if (document.getElementById("ed-status-grp")) document.getElementById("ed-status-grp").style.display = isAdmin ? "block" : "none";
  if (document.getElementById("ed-note-grp")) document.getElementById("ed-note-grp").style.display = isAdmin ? "block" : "none";

  if (document.getElementById("nr-name")) document.getElementById("nr-name").value = u.displayName;
  if (document.getElementById("nr-email")) document.getElementById("nr-email").value = u.email;
  const deptSel = document.getElementById("nr-dept");
  if (deptSel) {
    for (const opt of deptSel.options) { if (opt.value === u.department) { opt.selected = true; break; } }
  }

  // แสดง AI Chat Widget
  const chatWidget = document.getElementById("ai-chat-widget");
  if (chatWidget) chatWidget.style.display = "block";

  // อัปเดต Role Badge ใน Chat
  const roleBadge = document.getElementById("ai-chat-role");
  if (roleBadge) {
    roleBadge.textContent = isAdmin ? "Admin (SQL Mode)" : "Medical Staff (Helper)";
    roleBadge.style.background = isAdmin ? "rgba(255, 255, 255, 0.25)" : "rgba(255, 255, 255, 0.15)";
  }

  // กำหนดข้อความต้อนรับและประวัติการคุยตามบทบาทผู้ใช้
  const welcomeText = isAdmin 
    ? "สวัสดีครับแอดมิน! ผมพร้อมช่วยวิเคราะห์ตาราง HOSxP และร่าง SQL ให้คุณแล้ว ต้องการดึงข้อมูลส่วนไหนบอกได้เลยครับ" 
    : "สวัสดีครับ! ผมคือผู้ช่วย AI ยินดีให้คำแนะนำเกี่ยวกับการขอรายงานข้อมูล หากคุณไม่แน่ใจว่าต้องระบุข้อมูลอะไร สอบถามผมได้เลยครับ";
  aiChatHistory = [{ role: "model", text: welcomeText }];
  const chatMsgs = document.getElementById("ai-chat-messages");
  if (chatMsgs) {
    chatMsgs.innerHTML = `<div class="chat-message model">${welcomeText}</div>`;
  }

  navigate("dashboard");
}

function navigate(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  
  const pg = document.getElementById("page-" + page);
  if (pg) pg.classList.add("active");
  const nav = document.querySelector(`[data-page="${page}"]`);
  if (nav) nav.classList.add("active");
  
  const titles = { dashboard:"แดชบอร์ด", requests:"คำขอรายงาน", "new-request":"สร้างคำขอใหม่", logs:"บันทึกกิจกรรม", users:"จัดการผู้ใช้", settings:"จัดการโปรไฟล์ส่วนตัว" };
  document.getElementById("page-title").textContent = titles[page] || page;
  
  clearInterval(dashboardTimer);
  if (page === "dashboard") {
    loadDashboard();
    dashboardTimer = setInterval(() => {
      if (document.getElementById("page-dashboard").classList.contains("active")) {
        loadDashboard();
      }
    }, 30000);
  }
  if (page === "requests") loadRequests();
  if (page === "logs") loadLogs();
  if (page === "users") loadUsers();
  if (page === "settings") loadSettings();
}

// --- PROFILE / SETTINGS ENGINE ---------------------------
function loadSettings() {
  const u = App.user;
  if (!u) return;
  document.getElementById("set-username").value = u.username || "";
  document.getElementById("set-password").value = u.password || "";
  document.getElementById("set-display").value = u.displayName || "";
  document.getElementById("set-dept").value = u.department || "";
  document.getElementById("set-email").value = u.email || "";
  document.getElementById("set-lineid").value = u.lineId || "";
  document.getElementById("set-telegramid").value = u.telegramId || "";
}

async function saveSettings() {
  const payload = {
    password:    document.getElementById("set-password").value,
    displayName: document.getElementById("set-display").value.trim(),
    email:       document.getElementById("set-email").value.trim(),
    department:  document.getElementById("set-dept").value.trim(),
    lineId:      document.getElementById("set-lineid").value.trim(),
    telegramId:  document.getElementById("set-telegramid").value.trim()
  };
  
  if (!payload.displayName) { toast("กรุณากรอกชื่อที่แสดง", "error"); return; }
  
  const btn = document.getElementById("set-save-btn");
  if (btn) { btn.disabled = true; btn.textContent = "กำลังบันทึก..."; }
  
  const res = await GS.call("updateProfile", App.user.username, payload);
  
  if (btn) { btn.disabled = false; btn.textContent = "💾 บันทึกตั้งค่า"; }
  
  if (res.success) {
    // อัปเดตข้อมูลใน App.user ด้วย
    if (payload.password) App.user.password = payload.password;
    App.user.displayName = payload.displayName;
    App.user.email = payload.email;
    App.user.department = payload.department;
    App.user.lineId = payload.lineId;
    App.user.telegramId = payload.telegramId;
    
    document.getElementById("sidebar-username").textContent = App.user.displayName;
    document.getElementById("sidebar-role").innerHTML = (App.user.role === "admin" ? "ผู้ดูแลระบบ (IT)" : `เจ้าหน้าที่ ${App.user.department}`) + ' <span style="font-size: 10px; opacity: 0.7;">IT</span>';
    document.getElementById("set-password").value = "";
    toast("บันทึกข้อมูลส่วนตัวและตั้งค่าการแจ้งเตือนสำเร็จ", "success");
  } else {
    toast(res.message || "เกิดข้อผิดพลาดในการบันทึก", "error");
  }
}

async function testPersonalLine() {
  const lineId = document.getElementById("set-lineid").value.trim();
  if (!lineId) { toast("กรุณากรอก LINE ID ก่อนทดสอบ", "error"); return; }
  
  toast("กำลังส่งข้อความทดสอบ LINE...", "info");
  const res = await GS.call("testLineNotification", lineId);
  if (res.success) {
    toast(res.message, "success");
  } else {
    toast(res.message || "เกิดข้อผิดพลาดในการทดสอบ LINE", "error");
  }
}

async function testPersonalTelegram() {
  const telegramId = document.getElementById("set-telegramid").value.trim();
  if (!telegramId) { toast("กรุณากรอก Telegram Chat ID ก่อนทดสอบ", "error"); return; }
  
  toast("กำลังส่งข้อความทดสอบเข้า Telegram...", "info");
  const res = await GS.call("testTelegramNotification", telegramId);
  if (res.success) {
    toast(res.message, "success");
  } else {
    toast(res.message || "เกิดข้อผิดพลาดในการทดสอบ Telegram", "error");
  }
}

//  7. DASHBOARD ENGINE
// ============================================================
let dashboardFilter = "";

async function loadDashboard() {
  const res = await GS.call("getDashboardStats", App.user.username, App.user.role, App.user.displayName);
  if (!res.success) return;
  const d = res.data;
  
  document.getElementById("stat-total").textContent      = d.total;
  document.getElementById("stat-pending").textContent    = d.pending;
  document.getElementById("stat-processing").textContent = d.processing;
  document.getElementById("stat-done").textContent       = d.completed;
  document.getElementById("stat-rejected").textContent   = d.rejected;

  const total = d.total || 1;
  const segs = document.querySelectorAll("#progress-bar .progress-seg");
  const vals = [d.pending, d.processing, d.completed, d.rejected];
  segs.forEach((s, i) => { s.style.width = ((vals[i]/total)*100).toFixed(1) + "%"; });

  // อัปเดตสถานะการกรองบน UI
  const filterInfo = document.getElementById("dashboard-filter-info");
  const currentFilterText = document.getElementById("current-dashboard-filter");
  if (dashboardFilter) {
    if (filterInfo) filterInfo.style.display = "block";
    if (currentFilterText) currentFilterText.textContent = dashboardFilter;
  } else {
    if (filterInfo) filterInfo.style.display = "none";
  }

  // ไฮไลท์ Card ที่เลือก
  document.querySelectorAll(".stat-card").forEach(c => {
    if (c.dataset.filter === dashboardFilter) c.classList.add("selected");
    else c.classList.remove("selected");
  });

  // อัปเดตตัวเลข Sidebar Badge
  const badge = document.getElementById("nav-badge-pending");
  if (badge) {
    if (d.pending > 0) {
      badge.textContent = d.pending;
      badge.style.display = "inline-block";
    } else {
      badge.style.display = "none";
    }
  }

  // ตรวจจับคำขอใหม่และแจ้งเตือน In-App
  if (App.user && App.user.role === "admin") {
    if (App.lastPendingCount !== -1 && d.pending > App.lastPendingCount) {
      playNotificationSound();
      toast("🔔 มีคำขอรายงานใหม่เข้าระบบ!", "info");
    }
    App.lastPendingCount = d.pending;
  }

  const list = document.getElementById("recent-list");
  let displayRecent = d.recent;
  if (dashboardFilter) {
    displayRecent = displayRecent.filter(r => r.status === dashboardFilter);
  }

  if (!displayRecent || displayRecent.length === 0) {
    list.innerHTML = `<div class="empty-state">ไม่พบรายการที่มีสถานะ "${dashboardFilter || 'ทั้งหมด'}" ใน 10 รายการล่าสุด</div>`;
    return;
  }
  
  list.innerHTML = displayRecent.map(r => {
    const isOwner = (r.createdBy === App.user.displayName || String(r.createdBy).trim() === String(App.user.username).trim());
    const ownerBadge = isOwner ? '<b style="color:#e37400;"> [คำขอของฉัน]</b>' : '';
    return `
    <div class="recent-item" onclick="showDetail('${r.id}')">
      <div class="recent-dot" style="background:${statusColor(r.status)}"></div>
      <div class="recent-info">
        <div class="recent-no">${r.requestNo}${ownerBadge}</div>
        <div class="recent-name">${r.requesterName} — ${r.reportType}</div>
      </div>
      <div class="recent-time">${formatThaiDate(r.createdAt)}</div>
      ${statusBadge(r.status)}
    </div>`;
  }).join("");
}

function resetDashboardFilter() {
  dashboardFilter = "";

function renderTable() {
  const isAdmin = App.user.role === "admin";
  const tbody = document.getElementById("requests-tbody");
  if (!tbody) return;

  const rows = App.requests.filter(r => {
    const qs = App.searchQuery.toLowerCase();
    const matchSearch = !qs || [r.requestNo, r.requesterName, r.department, r.reportType].some(v => (v || "").toLowerCase().includes(qs));
    const matchStatus = !App.filterStatus || r.status === App.filterStatus;
    const matchDept = !App.filterDept || r.department === App.filterDept;
    return matchSearch && matchStatus && matchDept;
  });

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">ไม่พบรายการคิวคำขอ</div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const isOwner = (r.createdBy === App.user.displayName || String(r.createdBy).trim() === String(App.user.username).trim() || r.requesterName === App.user.displayName);
    const canEdit = isAdmin || (isOwner && r.status === "รอดำเนินการ");
    const canDelete = isAdmin || (isOwner && r.status === "รอดำเนินการ");
    
    const rowBgStyle = isOwner ? 'style="background-color: #fffde7;"' : '';
    const ownerBadge = isOwner ? '<span style="color:#e37400; font-weight:bold; font-size:11px; display:block;">📝 คำขอของฉัน</span>' : '';

    return `
    <tr ${rowBgStyle} onclick="showDetail('${r.id}')">
      <td><span class="req-no">${r.requestNo}</span>${ownerBadge}</td>
      <td>${r.requesterName}</td>
      <td>${r.department}</td>
      <td>${r.reportType}</td>
      <td>${urgencyBadge(r.urgency)}</td>
      <td>${statusBadge(r.status)}</td>
      <td>${formatDate(r.createdAt)}</td>
      <td onclick="event.stopPropagation()">
        <div class="td-actions">
          <button class="btn btn-sm btn-secondary btn-icon" title="ดู" onclick="showDetail('${r.id}')">👁️</button>
          ${canEdit ? `<button class="btn btn-sm btn-secondary btn-icon" title="แก้ไข" onclick="openEditModal('${r.id}')">✏️</button>` : ''}
          <button class="btn btn-sm btn-secondary btn-icon" title="PDF" onclick="openPdfModal('${r.id}')">📄</button>
          ${canDelete ? `<button class="btn btn-sm btn-danger btn-icon" title="ลบ" onclick="confirmDelete('${r.id}')">🗑️</button>` : ""}
        </div>
      </td>
    </tr>`;
  }).join("");
}

  const nameVal = document.getElementById('nr-name')?.value.trim();

  if (nameVal && emailVal && deptVal) {
    if (step1) step1.className = 'step-item active';
  } else {
    if (step1) step1.className = 'step-item';

function renderAiMarkdown(text) {
  if (!text) return "";
  
  // ป้องกัน XSS
  let escaped = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  // แปลง Code block
  escaped = escaped.replace(/```(?:sql|mysql|postgresql)?([\s\S]*?)```/g, (match, codeText) => {
    const trimmedCode = codeText.trim();
    return `<pre><code>${trimmedCode}</code><button class="ai-copy-btn" onclick="copySqlToClipboard(this)">📋 คัดลอก SQL</button></pre>`;
  });

  // แปลงตัวหนา
  escaped = escaped.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

  // แปลง Inline code
  escaped = escaped.replace(/`(.*?)`/g, '<code style="background:var(--gray-200); padding:2px 6px; border-radius:4px; font-family:monospace; font-size:13px; font-weight:bold; color:var(--primary-dark);">$1</code>');

  // จัดการ Newlines
  const parts = escaped.split(/(<pre>[\s\S]*?<\/pre>)/);
  for (let i = 0; i < parts.length; i++) {
    if (!parts[i].startsWith("<pre>")) {
      parts[i] = parts[i].replace(/\n/g, "<br>");
    }
  }
  return parts.join("");
}

function copySqlToClipboard(btn) {
  const pre = btn.parentElement;
  const code = pre.querySelector("code");
  if (!code) return;

  const text = code.innerText || code.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const originalText = btn.innerHTML;
    btn.innerHTML = "✅ คัดลอกสำเร็จ!";
    toast("คัดลอก SQL Query เรียบร้อยแล้ว", "success");
    setTimeout(() => {
      btn.innerHTML = originalText;
    }, 2000);
  }).catch(err => {
    toast("ไม่สามารถคัดลอกรหัสได้: " + err, "error");
  });
}

async function sendChatMessage() {
  const inputEl = document.getElementById("ai-chat-input");
  if (!inputEl) return;
  
  const text = inputEl.value.trim();
  if (!text) return;
  
  inputEl.value = "";
  
  // 1. แสดงข้อความของ User บน UI
  appendChatMessage("user", text);
  
  // 2. บันทึกลงในประวัติการคุย
  aiChatHistory.push({ role: "user", text: text });
  
  // 3. แสดงอนิเมชั่นกำลังพิมพ์ (Typing indicator)
  showChatTypingIndicator();
  
  // 4. เรียกหลังบ้านเพื่อสอบถาม Gemini
  const res = await GS.call("askGeminiChat", aiChatHistory, App.user ? App.user.role : "doctor");
  
  // 5. ลบอนิเมชั่นกำลังพิมพ์
  removeChatTypingIndicator();
  
  if (res.success) {
    // แสดงข้อความตอบกลับ
    appendChatMessage("model", res.response);
    aiChatHistory.push({ role: "model", text: res.response });
  } else {
    // แสดงข้อความผิดพลาด
    appendChatMessage("system", `⚠️ ขออภัย เกิดข้อผิดพลาด: ${res.message}`);
  }
}

function appendChatMessage(sender, text) {
  const msgBox = document.getElementById("ai-chat-messages");
  if (!msgBox) return;
  
  const msgDiv = document.createElement("div");
  msgDiv.className = `chat-message ${sender}`;
  
  if (sender === "model") {
    msgDiv.innerHTML = renderAiMarkdown(text);
  } else {
    // ป้องกัน XSS สำหรับ user/system
    msgDiv.textContent = text;
  }
  
  msgBox.appendChild(msgDiv);
  scrollChatToBottom();
}

function showChatTypingIndicator() {

}

function editUser(username) {
  const u = App.allUsers.find(x => String(x.username).trim() === String(username).trim());
  if (u) {
    openUserModal(u);
  } else {
    // กรณีค้นหาไม่พบใน state (อาจจะยังไม่ได้โหลดล่าสุด) ให้โหลดใหม่ทั้งหมด

      if (res.success) {

        const u2 = res.data.find(x => String(x.username).trim() === String(username).trim());
        if (u2) openUserModal(u2);

  }
}

}

function downloadCSV(data, fileName) {
  if (!data || data.length === 0) return;
  const headers = Object.keys(data[0]).join(",");
  const rows = data.map(obj => Object.values(obj).map(v => `"${String(v||"").replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + headers + "\n" + rows], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a"); link.href = url; link.download = fileName; link.click();
}

  function openSidebar() {
    if (sidebar) sidebar.classList.add("active");
    if (sidebarOverlay) sidebarOverlay.classList.add("active");
  }

  function closeSidebar() {
    if (sidebar) sidebar.classList.remove("active");
    if (sidebarOverlay) sidebarOverlay.classList.remove("active");
  }

  safeEvent("sidebar-toggle", "click", openSidebar);
  safeEvent("sidebar-close", "click", closeSidebar);
  safeEvent("sidebar-overlay", "click", closeSidebar);

  document.querySelectorAll(".nav-item[data-page]").forEach(el => {
    el.addEventListener("click", () => {
      navigate(el.dataset.page);
      closeSidebar();
    });
  });

  const topbarBtn = document.getElementById("topbar-new-btn");
  if (topbarBtn) topbarBtn.addEventListener("click", () => navigate("new-request"));

  document.querySelectorAll(".stat-card").forEach(card => {
    card.addEventListener("click", () => {
      if (document.getElementById("page-dashboard").classList.contains("active")) {
        dashboardFilter = (dashboardFilter === card.dataset.filter) ? "" : card.dataset.filter;
        loadDashboard();
      } else {
        App.filterStatus = card.dataset.filter;
        if(document.getElementById("filter-status")) document.getElementById("filter-status").value = card.dataset.filter;
        navigate("requests");
      }
    });
  });

  document.querySelectorAll("[data-close]").forEach(btn => {
    btn.addEventListener("click", () => closeModal(btn.dataset.close));
  });

  // ผูกตัวดักเหตุการณ์ระบบแชทอัจฉริยะ AI Chatbot
  safeEvent("ai-chat-toggle", "click", toggleChatPanel);
  safeEvent("ai-chat-close", "click", toggleChatPanel);
  safeEvent("ai-chat-send", "click", sendChatMessage);
  const chatInput = document.getElementById("ai-chat-input");
  if (chatInput) {
    chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendChatMessage();
      }
    });
  }

  // เรียกใช้ตัวเก็บรวบรวมสถานะความสมบูรณ์ของแบบฟอร์ม
  try {
    initFormAutoProgress();
  } catch (e) {
    console.error("Failed to initialize auto-progress for form", e);
  }
});
</script>
