<style>
/* ─── DESIGN TOKENS & VARIABLES ─────────────────── */
:root {
  --primary:         #0d9488;
  --primary-dark:    #0f766e;
  --primary-light:   #ccfbf1;
  --primary-gradient: linear-gradient(135deg, #0d9488 0%, #059669 100%);
  --accent-gradient:  linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
  --bg-gradient:      linear-gradient(135deg, #f0fdf4 0%, #ecfeff 100%);

  --blue:            #0284c7;
  --blue-bg:         #e0f2fe;
  --green:           #10b981;
  --green-bg:        #d1fae5;
  --yellow:          #f59e0b;
  --yellow-bg:       #fef3c7;
  --red:             #ef4444;
  --red-bg:          #fee2e2;
  --orange:          #f97316;
  --orange-bg:       #ffedd5;

  --gray-50:         #f8fafc;
  --gray-100:        #f1f5f9;
  --gray-200:        #e2e8f0;
  --gray-300:        #cbd5e1;
  --gray-400:        #94a3b8;
  --gray-600:        #475569;
  --gray-800:        #1e293b;
  --gray-900:        #0f172a;

  --surface:         rgba(255, 255, 255, 0.65);
  --surface-solid:   #ffffff;

  --shadow-sm:       0 1px 3px rgba(15, 23, 42, 0.04);
  --shadow-md:       0 10px 25px -5px rgba(15, 23, 42, 0.06), 0 8px 10px -6px rgba(15, 23, 42, 0.06);
  --shadow-lg:       0 20px 40px -15px rgba(15, 23, 42, 0.1);

  --radius:          16px;
  --radius-sm:       10px;
  --radius-lg:       24px;

  --transition:      all .25s cubic-bezier(.4, 0, .2, 1);
}

/* ─── RESET & BASE ──────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html {
  font-size: 15px;
  scroll-behavior: smooth;
}
body {
  font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: radial-gradient(at 0% 0%, #e6fcf5 0px, transparent 50%), 
              radial-gradient(at 50% 0%, #e0f2fe 0px, transparent 50%), 
              radial-gradient(at 100% 0%, #f0fdf4 0px, transparent 50%), 
              #f8fafc;
  background-attachment: fixed;
  color: var(--gray-800);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── LOADING SCREEN ────────────────────────────── */
#app-loading {
  position: fixed; inset: 0;
  background: var(--bg-gradient);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; gap: 20px;
  transition: opacity .4s ease;
}
#app-loading .logo-text {
  font-family: 'Outfit', 'Sarabun', sans-serif;
  color: var(--primary-dark);
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
#app-loading .sub {
  color: var(--gray-600);
  font-size: 14px;
  font-weight: 500;
}
.spinner {
  width: 44px; height: 44px;
  border: 4px solid var(--primary-light);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── LOGIN SCREEN ──────────────────────────────── */
#login-screen {
  display: none;
  min-height: 100vh;
  background: var(--bg-gradient);
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.login-card {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: var(--radius-lg);
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow-lg);
  animation: slideUp .6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp { 
  from { opacity: 0; transform: translateY(30px); } 
  to { opacity: 1; transform: translateY(0); } 
}
.login-icon {
  width: 60px; height: 60px;
  background: var(--primary-light);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin-bottom: 24px;
  box-shadow: 0 8px 16px rgba(13, 148, 136, 0.15);
}
.login-card h1 {
  font-family: 'Outfit', 'Sarabun', sans-serif;
  font-size: 24px;
  font-weight: 800;
  color: var(--gray-900);
}
.login-card p {
  font-size: 14px;
  color: var(--gray-600);
  margin-top: 6px;
  margin-bottom: 28px;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--gray-600);
  margin-bottom: 8px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14px;
  color: var(--gray-800);
  background: rgba(255, 255, 255, 0.5);
  transition: var(--transition);
  outline: none;
  min-height: 44px;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--primary);
  background: #fff;
  box-shadow: 0 0 0 3.5px rgba(13, 148, 136, 0.15);
}
.form-group textarea {
  resize: vertical;
  min-height: 90px;
}

/* ─── BUTTONS ───────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 20px; border: none; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: var(--transition); text-decoration: none;
  white-space: nowrap;
  min-height: 44px;
  user-select: none;
}
.btn-primary {
  background: var(--primary-gradient);
  color: #fff;
  box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2);
}
.btn-primary:hover {
  filter: brightness(1.06);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(13, 148, 136, 0.3);
}
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: rgba(255, 255, 255, 0.8);
  color: var(--gray-800);
  border: 1px solid var(--gray-200);
}
.btn-secondary:hover {
  background: #fff;
  border-color: var(--gray-400);
  box-shadow: var(--shadow-sm);
}

.btn-danger {
  background: var(--red);
  color: #fff;
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.15);
}
.btn-danger:hover {
  background: #dc2626;
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(239, 68, 68, 0.25);
}

.btn-success {
  background: var(--green);
  color: #fff;
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
}
.btn-success:hover {
  background: #059669;
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(16, 185, 129, 0.25);
}

.btn-sm {
  padding: 6px 14px;
  font-size: 13px;
  min-height: 36px;
}
.btn-icon {
  padding: 0;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  font-size: 16px;
}
.btn-block { width: 100%; }

#login-error {
  margin-top: 14px; padding: 12px 16px;
  background: var(--red-bg); color: #991b1b;
  border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
  display: none; border: 1px solid rgba(239, 68, 68, 0.2);
}

/* ─── APP SHELL & NAVIGATION ─────────────────────── */
#app-shell { display: none; }

/* SIDEBAR DRAWER */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: 260px;
  background: rgba(11, 37, 33, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex; flex-direction: column;
  z-index: 1000;
  transition: var(--transition);
  border-right: 1px solid rgba(255, 255, 255, 0.1);
}
.sidebar-header {
  padding: 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.sidebar-logo {
  font-family: 'Outfit', 'Sarabun', sans-serif;
  font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.3px;
}
.sidebar-logo span { color: var(--primary-light); }
.sidebar-sub { font-size: 12px; color: rgba(255,255,255,.5); margin-top: 4px; font-weight: 500; }

.sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px; cursor: pointer;
  color: rgba(255,255,255,.65); font-size: 14px; font-weight: 600;
  transition: var(--transition); border-left: 4px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,.05); color: #fff; }
.nav-item.active { background: rgba(13, 148, 136, 0.2); color: #fff; border-left-color: var(--primary); }
.nav-item .nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }

.nav-section {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  color: rgba(255,255,255,.3); padding: 16px 24px 6px;
  text-transform: uppercase;
}
.sidebar-footer {
  padding: 20px;
  border-top: 1px solid rgba(255,255,255,.08);
}
.user-info {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  padding: 8px; border-radius: var(--radius-sm);
  cursor: pointer; transition: var(--transition);
}
.user-info:hover {
  background: rgba(255, 255, 255, 0.08);
}
.user-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--primary-gradient); display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  box-shadow: 0 4px 10px rgba(13, 148, 136, 0.2);
}
.user-name { font-size: 14px; font-weight: 700; color: #fff; }
.user-role { font-size: 12px; color: rgba(255,255,255,.5); margin-top: 2px; }

/* SIDEBAR OVERLAY BACKDROP FOR MOBILE */
#sidebar-overlay {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, 0.3);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 999;
  display: none;
  opacity: 0;
  transition: opacity .3s ease;
}
#sidebar-overlay.active {
  display: block;
  opacity: 1;
}

/* MAIN CONTENT AREA */
.main-content {
  margin-left: 260px;
  min-height: 100vh;
  display: flex; flex-direction: column;
  transition: var(--transition);
}
.topbar {
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0, 0, 0, 0.05);
  padding: 0 32px; height: 70px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 500;
}
.page-title {
  font-family: 'Outfit', 'Sarabun', sans-serif;
  font-size: 19px; font-weight: 800; color: var(--gray-900);
}
.topbar-actions { display: flex; gap: 12px; align-items: center; }
.content-area { padding: 32px; flex: 1; }

/* ─── PAGES ─────────────────────────────────────── */
.page { display: none; }
.page.active { display: block; animation: fadeIn .3s cubic-bezier(0.4, 0, 0.2, 1); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ─── STAT CARDS ────────────────────────────────── */
.stats-grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
  gap: 20px; 
  margin-bottom: 24px; 
}
.stat-card {
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(12px) saturate(140%);
  -webkit-backdrop-filter: blur(12px) saturate(140%);
  border: 1px solid rgba(255, 255, 255, 0.55);
  border-radius: var(--radius);
  padding: 24px 20px; cursor: pointer;
  box-shadow: var(--shadow-sm); transition: var(--transition);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: space-between;
}
.stat-card:hover { 
  box-shadow: var(--shadow-md); 
  transform: translateY(-4px); 
  border-color: rgba(255,255,255,0.8);
}
.stat-card.selected { border-color: var(--primary); background: rgba(255,255,255,0.85); }
.stat-card::before {
  content: ''; position: absolute;
  top: 0; right: 0; width: 64px; height: 64px;
  border-radius: 0 var(--radius) 0 64px;
  opacity: .12;
}
.stat-card.blue::before   { background: var(--blue); }
.stat-card.yellow::before { background: var(--yellow); }
.stat-card.orange::before { background: var(--orange); }
.stat-card.green::before  { background: var(--green); }
.stat-card.red::before    { background: var(--red); }

.stat-icon { font-size: 24px; margin-bottom: 12px; }
.stat-value { 
  font-family: 'Outfit', sans-serif;
  font-size: 36px; font-weight: 800; line-height: 1; 
}
.stat-label { font-size: 13px; color: var(--gray-600); margin-top: 6px; font-weight: 700; }
.stat-card.blue   .stat-value { color: var(--blue); }
.stat-card.yellow .stat-value { color: var(--yellow); }
.stat-card.orange .stat-value { color: var(--orange); }
.stat-card.green  .stat-value { color: var(--green); }
.stat-card.red    .stat-value { color: var(--red); }

/* ─── PROGRESS & RECENT CARDS ────────────────────── */
.progress-card, .recent-card, .table-card {
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: var(--radius);
  padding: 24px; margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}
.progress-card:hover, .recent-card:hover {
  box-shadow: var(--shadow-md);
}
.progress-card h3, .recent-card h3 { 
  font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--gray-800); 
}
.progress-bar-wrap { height: 12px; background: rgba(0,0,0,0.05); border-radius: 99px; overflow: hidden; display: flex; }
.progress-seg { height: 100%; transition: width .6s cubic-bezier(.4,0,.2,1); }
.progress-legend { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 16px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-600); font-weight: 600; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ─── TABLE CARD & CONTROLS ──────────────────────── */
.table-card { padding: 0; overflow: hidden; }
.table-toolbar {
  padding: 20px 24px; display: flex; gap: 12px; flex-wrap: wrap;
  border-bottom: 1px solid rgba(0,0,0,0.05); align-items: center;
}
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255, 255, 255, 0.6); border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm); padding: 8px 14px; flex: 1; min-width: 220px;
  transition: var(--transition);
}
.search-box:focus-within {
  border-color: var(--primary); background: #fff;
  box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
}
.search-box input { border: none; background: none; outline: none; font-family: inherit; font-size: 14px; width: 100%; color: var(--gray-800); }
.filter-select {
  padding: 8px 14px; border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm); font-family: inherit; font-size: 13px;
  background: rgba(255, 255, 255, 0.6); cursor: pointer; outline: none;
  transition: var(--transition);
  color: var(--gray-800);
}
.filter-select:focus { border-color: var(--primary); background: #fff; }

.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; min-width: 800px; }
thead tr { background: rgba(0,0,0,0.015); border-bottom: 1px solid rgba(0,0,0,0.05); }
thead th { padding: 14px 20px; text-align: left; font-size: 12px; font-weight: 700; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.8px; white-space: nowrap; }
tbody tr { border-bottom: 1px solid rgba(0,0,0,0.04); transition: var(--transition); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(13, 148, 136, 0.04); cursor: pointer; }
tbody td { padding: 14px 20px; font-size: 14px; color: var(--gray-800); }
.req-no { font-family: 'Outfit', 'IBM Plex Mono', monospace; font-size: 13px; color: var(--primary-dark); font-weight: 700; }
.td-actions { display: flex; gap: 8px; }
.empty-state { text-align: center; padding: 48px 20px; color: var(--gray-400); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
.empty-state .empty-icon { font-size: 44px; }
.empty-state p { font-size: 15px; font-weight: 500; }

/* ─── BADGES ─────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 99px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
}
.badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
}
.badge-pending   { background: var(--yellow-bg); color: #854d00; }
.badge-process   { background: var(--blue-bg); color: #075985; }
.badge-done      { background: var(--green-bg);  color: #065f46; }
.badge-rejected  { background: var(--red-bg);    color: #991b1b; }
.badge-urgent    { background: var(--red-bg);    color: #991b1b; }
.badge-normal    { background: var(--gray-100);  color: var(--gray-600); }
.badge-high      { background: var(--orange-bg); color: #9a3412; }

/* ─── MODAL OVERLAY & CONTENT ───────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, 0.35); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 1050; display: none;
  align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeOverlay .2s ease;
}
.modal-overlay.open { display: flex; }
@keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(25px) saturate(180%);
  -webkit-backdrop-filter: blur(25px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: var(--radius-lg);
  width: 100%; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalSlide .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalSlide { from { opacity:0; transform: scale(.96) translateY(16px); } to { opacity:1; transform: scale(1) translateY(0); } }
.modal-sm  { max-width: 440px; }
.modal-md  { max-width: 620px; }
.modal-lg  { max-width: 840px; }
.modal-xl  { max-width: 980px; }
.modal-header {
  padding: 20px 28px;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  display: flex; align-items: center; justify-content: space-between; 
  position: sticky; top: 0; 
  background: rgba(255, 255, 255, 0.8); 
  backdrop-filter: blur(10px); 
  -webkit-backdrop-filter: blur(10px);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0; z-index: 1;
}
.modal-header h2 { font-size: 18px; font-weight: 800; color: var(--gray-900); }
.modal-body { padding: 28px; }
.modal-footer {
  padding: 16px 28px; border-top: 1px solid rgba(0,0,0,0.05);
  display: flex; justify-content: flex-end; gap: 10px;
  position: sticky; bottom: 0; 
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.close-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0, 0, 0, 0.05); border: none; cursor: pointer;
  font-size: 16px; color: var(--gray-600); display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.close-btn:hover { background: rgba(0, 0, 0, 0.1); color: var(--gray-900); }

/* ─── PDF PRINT CARD STYLES ──────────────────────── */
.pdf-page {
  background: #fff;
  width: 100%;
  max-width: 794px;
  margin: 0 auto;
  padding: 40px;
  box-sizing: border-box;
  border: 1px solid var(--gray-200);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.pdf-header { display: flex; align-items: center; gap: 20px; padding-bottom: 20px; border-bottom: 2px solid var(--primary); margin-bottom: 24px; }
.pdf-hospital-logo { width: 56px; height: 56px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; flex-shrink: 0; }
.pdf-hospital-name { font-size: 17px; font-weight: 700; }
.pdf-hospital-sub { font-size: 12px; color: var(--gray-600); }
.pdf-title { text-align: center; margin-bottom: 24px; }
.pdf-title h2 { font-size: 18px; font-weight: 700; color: var(--primary-dark); }
.pdf-title p { font-size: 12px; color: var(--gray-600); margin-top: 4px; }

.pdf-table {
  width: 100% !important;
  max-width: 100%;
  border-collapse: collapse;
  margin-bottom: 20px;
  table-layout: fixed;
}
.pdf-table th, .pdf-table td {
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.5;
  vertical-align: middle;
  word-break: break-word;
  white-space: normal;
}
.info-table tr td:first-child {
  width: 30%;
  font-weight: 600;
}
.info-table tr td:last-child {
  width: 70%;
}

/* ─── EMAIL DIALOG ANIMATIONS ────────────────────── */
.email-sent-anim {
  text-align: center; padding: 32px 20px;
  display: none;
}
